<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TodoLite</title>
  </head>
  <body>
    <div class="todo-app">
      <div class="title">todo-lite</div>

      <div class="todo-form">
        <input class="todo-input" type="text" placeholder="Add a new task..." />
        <button class="todo-button">Add Task</button>
      </div>

      <div class="item completed">
        <div class="item-content">
          <input type="checkbox" checked />
          <span class="name">Complete project documentation</span>
        </div>
        <button class="del">Delete</button>
      </div>

      <div class="item">
        <div class="item-content">
          <input type="checkbox" />
          <span class="name">Review code changes</span>
        </div>
        <button class="del">Delete</button>
      </div>

      <div class="item">
        <div class="item-content">
          <input type="checkbox" />
          <span class="name">Prepare presentation slides</span>
        </div>
        <button class="del">Delete</button>
      </div>
    </div>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        min-height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }

      .todo-app {
        width: 100%;
        max-width: 600px;
        min-height: 500px;
        padding: 40px 30px;
        background-color: #ffffff;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        margin-top: 20px;
      }

      .title {
        font-size: 36px;
        font-weight: 700;
        text-align: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 30px;
        letter-spacing: -0.5px;
      }

      .todo-form {
        display: flex;
        gap: 0;
        margin-bottom: 30px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        border-radius: 12px;
        overflow: hidden;
      }

      .todo-input {
        flex: 1;
        padding: 16px 20px;
        border: 2px solid #e8e8e8;
        outline: none;
        font-size: 16px;
        transition: all 0.3s ease;
        background-color: #fafafa;
      }

      .todo-input:focus {
        border-color: #667eea;
        background-color: #ffffff;
      }

      .todo-input::placeholder {
        color: #999;
      }

      .todo-button {
        padding: 16px 32px;
        border: none;
        border-radius: 0 12px 12px 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: #ffffff;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        user-select: none;
        transition: all 0.3s ease;
        letter-spacing: 0.5px;
      }

      .todo-button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
      }

      .todo-button:active {
        transform: translateY(0);
      }

      .item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 20px;
        margin-bottom: 12px;
        background-color: #ffffff;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        transition: all 0.3s ease;
        border: 2px solid transparent;
      }

      .item:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.12);
        border-color: #e8e8e8;
      }

      .item-content {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
      }

      .item input[type="checkbox"] {
        width: 20px;
        height: 20px;
        cursor: pointer;
        accent-color: #667eea;
      }

      .item .name {
        font-size: 16px;
        color: #333;
        transition: all 0.3s ease;
      }

      .item.completed .name {
        text-decoration: line-through;
        opacity: 0.5;
        color: #999;
      }

      .del {
        padding: 8px 16px;
        border: none;
        border-radius: 8px;
        background-color: #fee;
        color: #e74c3c;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
        user-select: none;
      }

      .del:hover {
        background-color: #e74c3c;
        color: #ffffff;
        transform: scale(1.05);
      }

      .del:active {
        transform: scale(0.95);
      }

      @media (max-width: 640px) {
        .todo-app {
          padding: 30px 20px;
          margin-top: 10px;
        }

        .title {
          font-size: 28px;
        }

        .todo-form {
          flex-direction: column;
        }

        .todo-button {
          border-radius: 12px;
          width: 100%;
        }

        .todo-input {
          border-radius: 12px;
        }
      }
    </style>
  </body>
</html>
